<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autonote Realtime</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --dim: #888;
    --me: #4fc3f7;
    --them: #ce93d8;
    --accent: #e94560;
    --green: #66bb6a;
    --yellow: #fdd835;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
  #connection-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #333;
  }
  #connection-status.connected { background: #1b5e20; color: #a5d6a7; }
  #connection-status.disconnected { background: #b71c1c; color: #ef9a9a; }

  /* Main layout — absolute positioning for reliable full-height columns */
  .main {
    flex: 1;
    position: relative;
    min-height: 0;
    overflow: hidden;
  }

  /* Resizable divider */
  .divider {
    position: absolute;
    top: 4px; bottom: 4px;
    left: 50%;
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.15s;
    z-index: 1;
  }
  .divider:hover, .divider.active { background: var(--accent); }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-header {
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-minimize {
    background: transparent;
    border: none;
    color: var(--dim);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .panel-minimize:hover { color: var(--text); }
  .panel.minimized { flex: 0 0 auto !important; }
  .panel.minimized .panel-body,
  .panel.minimized .coach-zone { display: none; }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
    min-height: 0;
  }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Left column: transcript */
  .left-col {
    position: absolute;
    top: 4px; bottom: 4px; left: 4px;
    right: calc(50% + 2px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #transcript-panel { flex: 1; min-height: 0; }
  .transcript-entry { margin-bottom: 4px; line-height: 1.4; }
  .transcript-entry .ts { color: var(--dim); font-size: 11px; }
  .transcript-entry .speaker-me { color: var(--me); font-weight: 600; }
  .transcript-entry .speaker-them { color: var(--them); font-weight: 600; }
  #partial-line {
    padding: 4px 8px;
    color: var(--dim);
    font-style: italic;
    min-height: 20px;
    flex-shrink: 0;
  }

  /* Right column: stacked panels */
  .right-col {
    position: absolute;
    top: 4px; bottom: 4px; right: 4px;
    left: calc(50% + 2px);
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }
  .right-col > .panel { flex: 1; min-height: 0; }
  .right-col > .panel.hidden { display: none; }
  .right-col > #coach-panel { flex: 3; }

  /* Coach panel: two-zone layout */
  #coach-panel {
    display: flex;
    flex-direction: column;
  }
  .coach-zone {
    border-bottom: 1px solid var(--border);
    padding: 0;
  }
  .coach-zone:last-child { border-bottom: none; }
  .zone-label {
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    background: rgba(233, 69, 96, 0.08);
    border-bottom: 1px solid var(--border);
  }
  #coach-current {
    flex: 0 1 auto;
    max-height: 40%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #coach-current-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }
  #coach-current-scroll::-webkit-scrollbar { width: 6px; }
  #coach-current-scroll::-webkit-scrollbar-track { background: transparent; }
  #coach-current-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #coach-current-body {
    padding: 8px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    min-height: 40px;
  }
  #coach-current-body .entry-label {
    font-size: 11px;
    padding: 2px 8px;
  }
  #coach-current-body .confidence {
    font-size: 11px;
  }
  /* Coach queue controls */
  .coach-controls {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    padding: 2px 8px;
  }
  .coach-badge {
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 700;
  }
  .coach-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: inherit;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
  }
  .coach-btn:hover { background: var(--border); color: var(--text); }
  @keyframes coachPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }
  .coach-pulse { animation: coachPulse 0.4s ease-in-out 3; }
  @keyframes coachFadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .coach-fade-in { animation: coachFadeIn 0.2s ease-out; }
  #coach-log {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #coach-log-body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
    min-height: 0;
  }
  #coach-log-body::-webkit-scrollbar { width: 6px; }
  #coach-log-body::-webkit-scrollbar-track { background: transparent; }
  #coach-log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Summary prose */
  #summary-body { white-space: pre-wrap; line-height: 1.5; }

  /* Action items */
  .action-item { margin-bottom: 3px; }
  .action-item .badge {
    display: inline-block;
    font-size: 10px;
    padding: 0 4px;
    border-radius: 3px;
    margin-right: 4px;
  }
  .badge-new { background: #1b5e20; color: #a5d6a7; }
  .badge-updated { background: #e65100; color: #ffcc80; }
  .badge-completed { background: var(--dim); color: var(--text); text-decoration: line-through; }

  /* Alert / reply entries */
  .alert-entry, .coach-entry, .reply-entry {
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
  }
  .alert-entry:last-child, .coach-entry:last-child, .reply-entry:last-child {
    border-bottom: none;
  }
  .entry-time { font-size: 10px; color: var(--dim); margin-bottom: 2px; }
  .entry-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    margin-bottom: 4px;
  }
  .label-contradiction { background: #b71c1c; color: #ef9a9a; }
  .label-reply { background: #1565c0; color: #90caf9; }
  .label-speak { background: #1b5e20; color: #a5d6a7; }
  .label-wait { background: #e65100; color: #ffcc80; }
  .label-custom { background: #6a1b9a; color: #ce93d8; }
  .confidence { font-size: 10px; color: var(--dim); margin-left: 6px; }
  .dim { color: var(--dim); font-size: 12px; }
  .suggestion-list { list-style: none; padding-left: 0; }
  .suggestion-list li { margin-bottom: 3px; }
  .suggestion-list li::before { content: "\2192 "; color: var(--accent); }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .bottom-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .bottom-bar input:focus { border-color: var(--accent); }
  .bottom-bar button {
    background: var(--border);
    border: none;
    border-radius: 4px;
    color: var(--text);
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .bottom-bar button:hover { background: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>AUTONOTE REALTIME</h1>
  <span id="connection-status" class="disconnected">disconnected</span>
</header>

<div class="main">
  <!-- Left: Transcript -->
  <div class="left-col">
    <div id="transcript-panel" class="panel">
      <div class="panel-header">Transcript</div>
      <div id="transcript-body" class="panel-body"></div>
    </div>
    <div id="partial-line"></div>
  </div>

  <!-- Drag handle -->
  <div class="divider" id="divider"></div>

  <!-- Right: Stacked panels -->
  <div class="right-col">
    <div id="coach-panel" class="panel">
      <div class="panel-header"><span>Coach</span><button class="panel-minimize" data-panel="coach-panel" title="Minimize">&minus;</button></div>
      <div id="coach-current" class="coach-zone">
        <div class="zone-label">Say This</div>
        <div id="coach-controls" class="coach-controls" style="display:none">
          <button id="coach-prev-btn" class="coach-btn" style="display:none">&larr; Prev</button>
          <span id="coach-badge" class="coach-badge"></span>
          <button id="coach-next-btn" class="coach-btn">Next &rarr;</button>
          <button id="coach-latest-btn" class="coach-btn" style="display:none">Latest &raquo;</button>
        </div>
        <div id="coach-current-scroll">
          <div id="coach-current-body">Waiting for coach...</div>
        </div>
      </div>
      <div id="coach-log" class="coach-zone">
        <div class="zone-label">Strategy Log</div>
        <div id="coach-log-body"></div>
      </div>
    </div>
    <div id="summary-panel" class="panel">
      <div class="panel-header"><span>Summary</span><button class="panel-minimize" data-panel="summary-panel" title="Minimize">&minus;</button></div>
      <div id="summary-body" class="panel-body">Waiting for conversation...</div>
    </div>
    <div id="actions-panel" class="panel">
      <div class="panel-header"><span>Action Items</span><button class="panel-minimize" data-panel="actions-panel" title="Minimize">&minus;</button></div>
      <div id="actions-body" class="panel-body"></div>
    </div>
    <div id="alerts-panel" class="panel">
      <div class="panel-header"><span>Alerts &amp; Replies</span><button class="panel-minimize" data-panel="alerts-panel" title="Minimize">&minus;</button></div>
      <div id="alerts-body" class="panel-body"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <input id="prompt-input" type="text" placeholder="Ask about the meeting..." />
  <button onclick="sendAction('summary')">Summary</button>
  <button onclick="sendAction('action_items')">Actions</button>
  <button onclick="sendAction('contradictions')">Check</button>
  <button onclick="sendAction('reply')">Reply</button>
  <button onclick="sendAction('coach')">Coach</button>
</div>

<script>
const $ = (sel) => document.getElementById(sel);

let ws;
let reconnectTimer;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    $('connection-status').textContent = 'connected';
    $('connection-status').className = 'connected';
    clearTimeout(reconnectTimer);
  };

  ws.onclose = () => {
    $('connection-status').textContent = 'disconnected';
    $('connection-status').className = 'disconnected';
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);
    switch (event.type) {
      case 'transcript_segment': handleTranscript(event); break;
      case 'aggregated_turn': handleTurn(event); break;
      case 'summary_update': handleSummary(event); break;
      case 'action_items_update': handleActionItems(event); break;
      case 'contradiction_alert': handleContradiction(event); break;
      case 'reply_suggestion': handleReply(event); break;
      case 'coach_suggestion': handleCoach(event); break;
      case 'custom_prompt_result': handleCustom(event); break;
    }
  };
}

function sendAction(action) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action }));
  }
}

function formatTime(seconds) {
  if (!seconds || seconds <= 0) return '';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// Coach queue state
const coachQueue = [];
const coachHistory = [];
let coachCurrent = null;

function autoScroll(el) {
  if (el.dataset.userScrolled !== 'true') {
    el.scrollTop = el.scrollHeight;
  }
}

// --- Transcript ---

function handleTranscript(event) {
  if (event.is_partial) {
    const cls = event.speaker === 'Me' ? 'speaker-me' : 'speaker-them';
    $('partial-line').innerHTML =
      `<span class="${cls}">${event.speaker}:</span> ${escapeHtml(event.text)}`;
    return;
  }
  appendTranscriptEntry(event.speaker, event.text, event.timestamp_start);
}

function handleTurn(event) {
  $('partial-line').innerHTML = '';
  appendTranscriptEntry(event.speaker, event.text, event.timestamp_start);
}

function appendTranscriptEntry(speaker, text, ts) {
  const body = $('transcript-body');
  const cls = speaker === 'Me' ? 'speaker-me' : 'speaker-them';
  const timeStr = formatTime(ts);
  const div = document.createElement('div');
  div.className = 'transcript-entry';
  div.innerHTML =
    `<span class="ts">[${timeStr}]</span> <span class="${cls}">${speaker}:</span> ${escapeHtml(text)}`;
  body.appendChild(div);
  autoScroll(body);
}

// --- Summary ---

function handleSummary(event) {
  $('summary-body').textContent = event.summary;
}

// --- Action Items ---

function handleActionItems(event) {
  const body = $('actions-body');
  body.innerHTML = '';
  for (const item of event.items) {
    const div = document.createElement('div');
    div.className = 'action-item';
    const badgeCls = item.status === 'new' ? 'badge-new'
                   : item.status === 'updated' ? 'badge-updated'
                   : 'badge-completed';
    const assignee = item.assignee ? ` @${item.assignee}` : '';
    div.innerHTML =
      `<span class="badge ${badgeCls}">${item.status}</span>${escapeHtml(item.description)}` +
      `<span class="dim">${assignee}</span>`;
    body.appendChild(div);
  }
}

// --- Contradictions (append with history) ---

function handleContradiction(event) {
  const body = $('alerts-body');
  const div = document.createElement('div');
  div.className = 'alert-entry';
  div.innerHTML =
    `<div class="entry-time">${now()}</div>` +
    `<span class="entry-label label-contradiction">${event.severity}</span>` +
    `<div>${escapeHtml(event.description)}</div>` +
    `<div class="dim">A: "${escapeHtml(event.statement_a)}"</div>` +
    `<div class="dim">B: "${escapeHtml(event.statement_b)}"</div>`;
  body.appendChild(div);
  autoScroll(body);
}

// --- Reply Suggestions (append with history) ---

function handleReply(event) {
  const body = $('alerts-body');
  const div = document.createElement('div');
  div.className = 'reply-entry';
  let items = '';
  for (const s of event.suggestions) {
    items += `<li>${escapeHtml(s)}</li>`;
  }
  div.innerHTML =
    `<div class="entry-time">${now()}</div>` +
    `<span class="entry-label label-reply">${event.triggered_by}</span>` +
    `<ul class="suggestion-list">${items}</ul>` +
    `<div class="dim">${escapeHtml(event.context)}</div>`;
  body.appendChild(div);
  autoScroll(body);
}

// --- Coach Suggestions (two-zone: current + log) ---

function handleCoach(event) {
  const tag = event.should_speak ? 'SPEAK' : 'WAIT';
  const tagCls = event.should_speak ? 'label-speak' : 'label-wait';
  const entry = { tag, tagCls, event };

  // Bottom zone: always append immediately
  const log = $('coach-log-body');
  const div = document.createElement('div');
  div.className = 'coach-entry';
  div.innerHTML =
    `<div class="entry-time">${now()}</div>` +
    `<span class="entry-label ${tagCls}">${tag}</span>` +
    `<span class="confidence">${event.confidence}</span>` +
    `<div style="margin-top:4px">${escapeHtml(event.suggestion)}</div>` +
    (event.argument_used ? `<div class="dim">Argument: ${escapeHtml(event.argument_used)}</div>` : '') +
    `<div class="dim">${escapeHtml(event.reasoning)}</div>`;
  log.appendChild(div);
  autoScroll(log);

  // Top zone: show immediately if first or current is WAIT, otherwise queue
  if (coachCurrent === null || coachCurrent.tag === 'WAIT') {
    showCoachEntry(entry);
    updateCoachControls();
  } else {
    coachQueue.push(entry);
    updateCoachControls();
  }
}

function showCoachEntry(entry, fromHistory = false) {
  if (coachCurrent !== null && !fromHistory) {
    coachHistory.push(coachCurrent);
  }
  coachCurrent = entry;
  const body = $('coach-current-body');
  body.innerHTML =
    `<span class="entry-label ${entry.tagCls}">${entry.tag}</span>` +
    `<span class="confidence">${entry.event.confidence}</span>` +
    `<div style="margin-top:6px">${escapeHtml(entry.event.suggestion)}</div>`;
  body.classList.remove('coach-fade-in');
  void body.offsetWidth;
  body.classList.add('coach-fade-in');
}

function advanceCoach() {
  if (coachQueue.length === 0) return;
  showCoachEntry(coachQueue.shift());
  updateCoachControls();
}

function prevCoach() {
  if (coachHistory.length === 0) return;
  const prev = coachHistory.pop();
  if (coachCurrent !== null) coachQueue.unshift(coachCurrent);
  showCoachEntry(prev, true);
  updateCoachControls();
}

function skipToLatestCoach() {
  if (coachQueue.length === 0) return;
  const latest = coachQueue[coachQueue.length - 1];
  coachQueue.length = 0;
  showCoachEntry(latest);
  updateCoachControls();
}

function updateCoachControls() {
  const controls = $('coach-controls');
  const badge = $('coach-badge');
  const prevBtn = $('coach-prev-btn');
  const latestBtn = $('coach-latest-btn');
  const count = coachQueue.length;
  const hasPrev = coachHistory.length > 0;
  if (count === 0 && !hasPrev) {
    controls.style.display = 'none';
    return;
  }
  controls.style.display = 'flex';
  prevBtn.style.display = hasPrev ? 'inline-block' : 'none';
  badge.textContent = count || '';
  badge.style.display = count > 0 ? 'inline-block' : 'none';
  if (count > 0) {
    badge.classList.remove('coach-pulse');
    void badge.offsetWidth;
    badge.classList.add('coach-pulse');
  }
  latestBtn.style.display = count >= 2 ? 'inline-block' : 'none';
}

// --- Custom Prompt Result (append to alerts) ---

function handleCustom(event) {
  const body = $('alerts-body');
  const div = document.createElement('div');
  div.className = 'alert-entry';
  div.innerHTML =
    `<div class="entry-time">${now()}</div>` +
    `<span class="entry-label label-custom">Q</span>` +
    `<div class="dim">${escapeHtml(event.prompt)}</div>` +
    `<div style="margin-top:4px; white-space:pre-wrap">${escapeHtml(event.result)}</div>`;
  body.appendChild(div);
  autoScroll(body);
}

// --- Input ---

$('coach-prev-btn').addEventListener('click', prevCoach);
$('coach-next-btn').addEventListener('click', advanceCoach);
$('coach-latest-btn').addEventListener('click', skipToLatestCoach);

$('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (!val) return;
    e.target.value = '';
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'custom_prompt', prompt: val }));
    }
  }
});

// --- Utilities ---

function escapeHtml(text) {
  if (!text) return '';
  const el = document.createElement('span');
  el.textContent = text;
  return el.innerHTML;
}

// --- Resizable divider ---

(function() {
  const main = document.querySelector('.main');
  const leftCol = document.querySelector('.left-col');
  const rightCol = document.querySelector('.right-col');
  const divider = $('divider');
  let dragging = false;

  divider.addEventListener('mousedown', (e) => {
    dragging = true;
    divider.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = main.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = Math.max(20, Math.min(80, (x / rect.width) * 100));
    divider.style.left = pct + '%';
    leftCol.style.right = `calc(${100 - pct}% + 2px)`;
    rightCol.style.left = `calc(${pct}% + 2px)`;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// --- Profile-driven panel config ---

const PANEL_MAP = {
  summary: 'summary-panel',
  action_items: 'actions-panel',
  alerts: 'alerts-panel',
  coach: 'coach-panel',
};

const MAX_HEIGHT_MAP = {
  summary: 'summary-panel',
  action_items: 'actions-panel',
  alerts: 'alerts-panel',
  coach: 'coach-panel',
};

async function applyConfig() {
  try {
    const resp = await fetch('/config');
    const cfg = await resp.json();

    // Hide panels disabled by profile
    for (const [key, elId] of Object.entries(PANEL_MAP)) {
      if (cfg.panels && cfg.panels[key] === false) {
        $(elId).classList.add('hidden');
      }
    }

    // Apply max-height overrides
    if (cfg.max_heights) {
      for (const [key, val] of Object.entries(cfg.max_heights)) {
        if (val && MAX_HEIGHT_MAP[key]) {
          $(MAX_HEIGHT_MAP[key]).style.maxHeight = val;
        }
      }
    }
  } catch (e) {
    console.warn('Could not fetch config:', e);
  }
}

// --- Auto-scroll: follow bottom unless user has scrolled up ---

document.querySelectorAll('.panel-body, #coach-log-body').forEach(el => {
  el.addEventListener('scroll', () => {
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    el.dataset.userScrolled = atBottom ? 'false' : 'true';
  });
});

// --- Panel minimize/expand ---

document.querySelectorAll('.panel-minimize').forEach(btn => {
  btn.addEventListener('click', () => {
    const panel = $(btn.dataset.panel);
    const minimized = panel.classList.toggle('minimized');
    btn.innerHTML = minimized ? '+' : '&minus;';
    btn.title = minimized ? 'Expand' : 'Minimize';
  });
});

// --- Start ---
applyConfig();
connect();
</script>
</body>
</html>
